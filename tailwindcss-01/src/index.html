<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="./output.css" rel="stylesheet" />
</head>

<body class="min-h-screen bg-gray-100 p-6 text-gray-800 dark:bg-gray-950 dark:text-gray-100">
  <main class="mx-auto grid max-w-5xl grid-cols-1 items-start gap-8 md:grid-cols-2">
    <!--Dados De Pagamento-->
    <section class="space-y-6 rounded-xl bg-white p-8 shadow-lg dark:bg-gray-800">
      <h2 class="text-2xl font-bold">Informacoes de Pagamento</h2>
      <form class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium" for="name">Nome Completo</label>
          <input
            class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
            type="text" id="name" name="name" placeholder="Joao da Silva" />
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium" for="card-number">Numero do Cartao</label>
          <input
            class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
            type="text" id="card-number" name="card-number" placeholder="1234 5678 9012 3456" />
        </div>
        <div class="flex gap-4">
          <div>
            <label class="mb-1 block text-sm font-medium" for="expiry">Validade</label>
            <input
              class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
              type="text" id="expiry" name="expiry" placeholder="MM/AA" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" for="cvc">CVC</label>
            <input
              class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
              type="text" id="cvc" name="cvc" placeholder="123" />
          </div>
        </div>

        <button type="submit" class="w-full rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 py-3 
         font-semibold text-white transition duration-300 hover:from-blue-600 hover:via-blue-400 hover:to-purple-700">
          Finalizar Compra
        </button>

      </form>
    </section>
    <!--Resumo do Pedido-->
    <aside class="space-y-6 rounded-xl bg-white p-8 shadow-lg dark:bg-gray-800">
      <h2 class="text-2xl font-bold"> Resumo do Pedido</h2>
      <ul class="space-y-4">
        <li class=" flex justify-between">
          <span>Produto 1</span>
          <span>R$ 99.90</span>
        </li>

        <li class=" flex justify-between">
          <span>Produto 2</span>
          <span>R$ 149.90</span>
        </li>

         <li class=" flex justify-between border-t border-gray-200 pt-4 font-semibold dark:border-gray-700">
          <span>Total</span>
          <span>R$ 249.80</span>
        </li>

      </ul>

      <p class="text-sm text-center text-gray-500 dark:text-gray-400">
        Todos os pagamentos são processados com segurança. Seus dados estão protegidos.
      </p>
    </aside>
  </main>
</body>

</html>
