<div class="flex h-full flex-col justify-between">
  <div class="space-y-14">
    <div class="space-y-1">
      <!-- Home -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 brightness-150 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideHome size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">Home</span>
      </div>
      <!--Fim Home -->

      <!-- Explore -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideHash size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">Explore</span>
      </div>
      <!--Fim Explore -->

      <!-- Notifications -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <div class="relative">
          <svg class="text-text" lucideBell size="21" color="currentColor"></svg>
          <div
            class="bg-blue absolute -top-1.5 -right-1 flex size-[15px] items-center justify-center rounded-full text-[11px] text-white"
          >
            1
          </div>
          
        </div>
        <span class="text-text font-semibold">Notifications</span>
      </div>
      <!--Fim Notifications -->

      <!-- Messages -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideMail size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">Messages</span>
      </div>
      <!--Fim Messages -->

      <!-- Bookmarks -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideBookmark size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">Bookmarks</span>
      </div>
      <!--Fim Bookmarks -->

      <!-- Lists -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideList size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">Lists</span>
      </div>
      <!--Fim Lists -->

      <!-- User -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideUser size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">Profile</span>
      </div>
      <!--Fim User -->

      <!-- More -->
      <div
        class="hover:bg-hover/40 flex cursor-pointer items-center gap-3 rounded-sm px-3 py-3 transition-all hover:brightness-125"
      >
        <svg class="text-text" lucideCircleEllipsis size="21" color="currentColor"></svg>
        <span class="text-text font-semibold">More</span>
      </div>
      <!--Fim More -->
    </div>
     <app-button [variant]="'small'"> Tweet</app-button>
  </div>
  <div class="flex items-center gap-4 pr-4">
    <img src="https://thispersondoesnotexist.com/" class="size-10 rounded-full">
    <div  class=" -space-x-0.5 flex-1">
        <div class=" -space-x-0.5 flex-1">
            <div class="text-text text-[15px] font-bold">Farley Rufino</div>
             <div class="text-text text-[13px] font-bold">@Farley.t.i</div>
             <div class="ml-5">
                  <svg lucideEllipse size="5" color="currentColor"></svg>
             </div>
        </div>
    </div>
  </div>
</div>
