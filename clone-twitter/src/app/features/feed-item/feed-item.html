 <div class="flex gap-5 px-6 py-4">
      <img
        src="https://picsum.photos/100"
        class="size-11 rounded-full"
        alt="Nome do Usuário"
      />

      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <div class="text-text text-[15px] font-semibold">{{ title }}</div>
          <svg BadgeCheck class="text-blue -ml-1 size-4" fill="#1c8fdb53" />
          <div class="text-gray text-sm lowercase">@{{title}}</div>
          <div class="text-gray text-sm lowercase">• 7m</div>
        </div>
        <div class="text-text text-sm">{{description}}</div>
        <div class="mt-5 flex items-center gap-7">
          <div class="flex items-center gap-1.5">
            <svg MessageCircle class="text-gray size-4" />
            <span class="text-gray text-xs font-medium">103</span>
          </div>
          <div class="flex items-center gap-1.5">
            <svg Repeat2 class="text-gray size-4" />
            <span class="text-gray text-xs font-medium">79</span>
          </div>
          <div class="flex items-center gap-1.5">
            <svg Heart class="text-gray size-4" />
            <span class="text-gray text-xs font-medium">1.000</span>
          </div>
        </div>
      </div>
    </div>
