<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
  </head>

  <body
    class="min-h-screen bg-gray-100 p-6 text-gray-800 dark:bg-gray-950 dark:text-gray-100"
  >
    <main
      class="mx-auto grid max-w-5xl grid-cols-1 items-start gap-8 md:grid-cols-2"
    >
      <!-- Dados de Pagamento -->
      <section
        class="space-y-6 rounded-xl bg-white p-8 shadow-lg dark:bg-gray-800"
      >
        <h2 class="text-2xl font-bold">Informações de Pagamento</h2>

        <form class="space-y-4">
          <div>
            <label class="mb-1 block text-sm font-medium" for="name"
              >Nome Completo</label
            >
            <input
              id="name"
              placeholder="João da Silva"
              class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
            />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" for="card"
              >Número do Cartão</label
            >
            <input
              id="card"
              placeholder="**** **** **** ****"
              class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
            />
          </div>
          <div class="flex gap-4">
            <div>
              <label class="mb-1 block text-sm font-medium" for="exp"
                >Validade</label
              >
              <input
                id="exp"
                placeholder="MM/AA"
                class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium" for="cvc"
                >CVC</label
              >
              <input
                id="cvc"
                placeholder="123"
                class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2 dark:border-gray-600 dark:bg-gray-700"
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 py-3 font-semibold text-white transition duration-300 hover:from-blue-600 hover:via-blue-400 hover:to-purple-700"
          >
            Finalizar Compra
          </button>
        </form>
      </section>

      <!-- Resumo do Pedido -->
      <aside
        class="space-y-6 rounded-xl bg-white p-8 shadow-lg dark:bg-gray-800"
      >
        <h2 class="text-2xl font-bold">Resumo do Pedido</h2>

        <ul class="space-y-4">
          <li class="flex justify-between">
            <span>Produto 1</span>
            <span>R$ 100,00</span>
          </li>
          <li class="flex justify-between">
            <span>Produto 2</span>
            <span>R$ 49,00</span>
          </li>
          <li
            class="flex justify-between border-t border-gray-200 pt-4 font-semibold dark:border-gray-700"
          >
            <span>Total</span>
            <span>R$ 149,00</span>
          </li>
        </ul>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400">
          Todos os pagamentos são processados com segurança. Seus dados estão
          protegidos.
        </p>
      </aside>
    </main>
  </body>
</html>
